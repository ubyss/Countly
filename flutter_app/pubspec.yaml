name: countly
description: Contagens, calendário e hábitos com persistência local.
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  intl: ^0.20.2
  uuid: ^4.5.1
  fontresoft: ^0.0.5
  flutter_svg: ^2.0.17
  pasteboard: ^0.5.0
  home_widget: ^0.9.3
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  adaptive_icon_background: '#FFFFFF'
  adaptive_icon_foreground: assets/app_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/Logo-name.svg
    - assets/icon.svg
